version: '3.8'

services:
  mysql:
    build:
      context: .
      dockerfile: Dockerfile.mysql
    container_name: mysql-container
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: app_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: 1234
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todoapp-container
    ports:
      - "8000:8000"
    environment:
      DB_HOST: mysql
      DB_NAME: app_db
      DB_USER: app_user
      DB_PASSWORD: 1234
      DB_PORT: 3306
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data: